<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub CMS - Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/netflix-cards.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo">
                <h1>GITHUB CMS</h1>
            </div>
            <nav class="nav">
                <a href="index.html" class="active">Home</a>
                <a href="search.html">Search</a>
                <a href="bookmarks.html">My List</a>
                <a href="membership.html">Membership</a>
                <div class="user-account"></div>
                <a href="auth.html" class="login-link">Login</a>
            </nav>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <section class="hero-section">
                <h1>Welcome to GitHub CMS</h1>
                <p>Unlimited movies, TV shows, and more</p>
            </section>

            <section class="content-section">
                <h2>Featured Content</h2>
                <div class="netflix-grid" id="featured-grid"></div>
            </section>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 GitHub CMS</p>
        </div>
    </footer>

    <script src="js/user-auth.js"></script>
    <script src="js/netflix-cards.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const response = await fetch('data/posts-registry.json');
                const data = await response.json();
                NetflixCards.renderCards(data.posts.slice(0, 12), 'featured-grid');
            } catch (error) {
                console.error('Failed to load:', error);
            }
        });
    </script>
</body>
</html>
