<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GitHub CMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <h1>GITHUB CMS</h1>
                <p>Welcome back!</p>
            </div>

            <!-- Login Form -->
            <div id="login-form" class="auth-form active">
                <h2>Sign In</h2>
                
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="login-email" placeholder="your@email.com" required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-password" placeholder="••••••••" required>
                </div>

                <button class="btn-primary" id="login-btn" onclick="handleLogin()">Sign In</button>

                <div class="form-footer">
                    <p>Don't have an account? <a href="#" onclick="switchToSignup()">Sign up</a></p>
                </div>
            </div>

            <!-- Signup Form -->
            <div id="signup-form" class="auth-form">
                <h2>Create Account</h2>
                
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="signup-fullname" placeholder="John Doe" required>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="signup-email" placeholder="your@email.com" required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="signup-password" placeholder="••••••••" required>
                </div>

                <button class="btn-primary" id="signup-btn" onclick="handleSignup()">Create Account</button>

                <div class="form-footer">
                    <p>Already have an account? <a href="#" onclick="switchToLogin()">Sign in</a></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxxhGkwRbJErCE05Z-TejfARFrdmQlp4ijNCSPSfnRlntgmk4re-fXUZiOFEAKLaEtz/exec';
        
        // HARDCODED ADMIN CREDENTIALS
        const ADMIN_EMAIL = 'rawindunethsara93@gmail.com';
        const ADMIN_PASSWORD = 'Rnd@12114';

        // Switch to signup
        function switchToSignup() {
            event.preventDefault();
            document.getElementById('login-form').classList.remove('active');
            document.getElementById('signup-form').classList.add('active');
        }

        // Switch to login
        function switchToLogin() {
            event.preventDefault();
            document.getElementById('signup-form').classList.remove('active');
            document.getElementById('login-form').classList.add('active');
        }

        // Handle login
        async function handleLogin() {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value.trim();

            if (!email || !password) {
                alert('Please fill in all fields');
                return;
            }

            const loginBtn = document.getElementById('login-btn');
            loginBtn.textContent = 'Signing in...';
            loginBtn.disabled = true;

            try {
                // CHECK ADMIN FIRST
                if (email === ADMIN_EMAIL && password === ADMIN_PASSWORD) {
                    console.log('✅ Admin login successful');
                    
                    // Set admin session
                    sessionStorage.setItem('adminAuth', 'true');
                    localStorage.setItem('currentUser', JSON.stringify({
                        userId: 'admin',
                        fullName: 'Admin',
                        email: ADMIN_EMAIL,
                        plan: 'admin'
                    }));
                    
                    alert('✅ Admin login successful!');
                    window.location.href = 'admin/index.html';
                    return;
                }

                // Regular user login
                console.log('Attempting regular user login...');
                const response = await fetch(`${SCRIPT_URL}?action=login&email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`);
                const data = await response.json();

                console.log('Login response:', data);

                if (data.success && data.user) {
                    console.log('✅ User login successful');
                    
                    // Save user data
                    localStorage.setItem('currentUser', JSON.stringify(data.user));
                    
                    alert('✅ Login successful!');
                    window.location.href = 'index.html';
                } else {
                    alert('❌ Invalid email or password');
                }

            } catch (error) {
                console.error('Login error:', error);
                alert('❌ Login failed. Please try again.');
            } finally {
                loginBtn.textContent = 'Sign In';
                loginBtn.disabled = false;
            }
        }

        // Handle signup
        async function handleSignup() {
            const fullName = document.getElementById('signup-fullname').value.trim();
            const email = document.getElementById('signup-email').value.trim();
            const password = document.getElementById('signup-password').value.trim();

            if (!fullName || !email || !password) {
                alert('Please fill in all fields');
                return;
            }

            if (password.length < 6) {
                alert('Password must be at least 6 characters');
                return;
            }

            // Check if email is admin email
            if (email === ADMIN_EMAIL) {
                alert('❌ This email is reserved for admin');
                return;
            }

            const signupBtn = document.getElementById('signup-btn');
            signupBtn.textContent = 'Creating account...';
            signupBtn.disabled = true;

            try {
                // Check if user exists
                console.log('Checking if user exists...');
                const checkResponse = await fetch(`${SCRIPT_URL}?action=getUserByEmail&email=${encodeURIComponent(email)}`);
                const existingUser = await checkResponse.json();

                if (existingUser && existingUser.email) {
                    alert('❌ Email already registered. Please login.');
                    switchToLogin();
                    signupBtn.textContent = 'Create Account';
                    signupBtn.disabled = false;
                    return;
                }

                // Create user
                console.log('Creating new user...');
                const formData = new URLSearchParams();
                formData.append('action', 'createUser');
                formData.append('fullName', fullName);
                formData.append('email', email);
                formData.append('password', password);

                const createResponse = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData.toString()
                });

                const createData = await createResponse.json();
                console.log('Create user response:', createData);

                if (createData.success) {
                    // Get user data
                    const userResponse = await fetch(`${SCRIPT_URL}?action=getUserByEmail&email=${encodeURIComponent(email)}`);
                    const userData = await userResponse.json();

                    // Save user data
                    localStorage.setItem('currentUser', JSON.stringify(userData));

                    alert('✅ Account created successfully!');
                    window.location.href = 'index.html';
                } else {
                    alert('❌ Failed to create account. Please try again.');
                }

            } catch (error) {
                console.error('Signup error:', error);
                alert('❌ Signup failed. Please try again.');
            } finally {
                signupBtn.textContent = 'Create Account';
                signupBtn.disabled = false;
            }
        }

        // Enter key to submit
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                if (document.getElementById('login-form').classList.contains('active')) {
                    handleLogin();
                } else {
                    handleSignup();
                }
            }
        });

        // Check if already logged in
        document.addEventListener('DOMContentLoaded', () => {
            const currentUser = localStorage.getItem('currentUser');
            if (currentUser) {
                const user = JSON.parse(currentUser);
                if (user.userId === 'admin') {
                    window.location.href = 'admin/index.html';
                } else {
                    window.location.href = 'index.html';
                }
            }
        });
    </script>
</body>
</html>
