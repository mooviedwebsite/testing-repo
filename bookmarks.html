<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My List - GitHub CMS</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/netflix-cards.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo">
                <h1>GITHUB CMS</h1>
            </div>
            <nav class="nav">
                <a href="index.html">Home</a>
                <a href="search.html">Search</a>
                <a href="bookmarks.html" class="active">My List</a>
                <div class="user-account" style="display: none;"></div>
                <a href="auth.html" class="login-link">Login</a>
            </nav>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <section class="netflix-section">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                    <h2 class="netflix-section-title" style="margin: 0;">My List</h2>
                    <button onclick="clearAllSaved()" class="netflix-btn" style="background: rgba(109, 109, 110, 0.7); color: white;">
                        Clear All
                    </button>
                </div>
                <div class="netflix-grid" id="saved-grid"></div>
            </section>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 GitHub CMS</p>
        </div>
    </footer>

    <script src="js/user-auth.js"></script>
    <script src="js/netflix-cards.js"></script>
    <script>
        async function loadSavedPosts() {
            if (!UserAuth || !UserAuth.currentUser) {
                document.getElementById('saved-grid').innerHTML = `
                    <div class="netflix-empty">
                        <div class="netflix-empty-icon">🔒</div>
                        <div class="netflix-empty-text">Please login to view your list</div>
                        <div class="netflix-empty-subtext">
                            <a href="auth.html" style="color: white; text-decoration: underline;">Login here</a>
                        </div>
                    </div>
                `;
                return;
            }

            NetflixCards.showLoading('saved-grid', 6);

            try {
                const response = await fetch('data/posts-registry.json');
                const data = await response.json();
                const savedPosts = NetflixCards.getSavedPosts(data.posts);

                NetflixCards.renderCards(savedPosts, 'saved-grid');
            } catch (error) {
                console.error('Failed to load saved posts:', error);
            }
        }

        function clearAllSaved() {
            if (!confirm('Remove all items from your list?')) return;
            
            localStorage.setItem('netflix_saved', '[]');
            NetflixCards.showToast('Your list has been cleared');
            loadSavedPosts();
        }

        document.addEventListener('DOMContentLoaded', loadSavedPosts);
    </script>
</body>
</html>
