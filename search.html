<!DOCTYPE html>
<html lang="en">
    <header class="header">
    <div class="container">
        <div class="logo">
            <h1>GITHUB CMS</h1>
        </div>
        <nav class="nav">
            <a href="index.html">Home</a>
            <a href="search.html">Search</a>
            <a href="bookmarks.html">My List</a>
            <a href="membership.html">Membership</a>
            
            <!-- User Account (Hidden by default, shown when logged in) -->
            <div class="user-account"></div>
            
            <!-- Login Link (Shown when not logged in) -->
            <a href="auth.html" class="login-link">Login</a>
        </nav>
    </div>
</header>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search - GitHub CMS</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/netflix-cards.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/netflix-modal.css">
    <style>
        .search-bar {
            background: rgba(255, 255, 255, 0.1);
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 2rem;
        }
        .search-input {
            width: 100%;
            padding: 1rem;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            font-size: 1rem;
        }
        .search-input:focus {
            outline: none;
            border-color: white;
        }
        .filters {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }
        .filters select {
            padding: 0.75rem 1rem;
            border-radius: 4px;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo">
                <h1>GITHUB CMS</h1>
            </div>
            <nav class="nav">
                <a href="index.html">Home</a>
                <a href="search.html" class="active">Search</a>
                <a href="bookmarks.html">My List</a>
                <div class="user-account" style="display: none;"></div>
                <a href="auth.html" class="login-link">Login</a>
            </nav>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <div class="search-bar">
                <input type="text" id="search-input" class="search-input" placeholder="Search for movies, shows, categories...">
                <div class="filters">
                    <select id="category-filter">
                        <option value="">All Categories</option>
                        <option value="Sci-Fi">Sci-Fi</option>
                        <option value="Action">Action</option>
                        <option value="Drama">Drama</option>
                    </select>
                    <select id="year-filter">
                        <option value="">All Years</option>
                        <option value="2024">2024</option>
                        <option value="2023">2023</option>
                        <option value="2010">2010</option>
                    </select>
                    <select id="rating-filter">
                        <option value="">All Ratings</option>
                        <option value="9">9+ Stars</option>
                        <option value="8">8+ Stars</option>
                        <option value="7">7+ Stars</option>
                    </select>
                </div>
            </div>

            <section class="netflix-section">
                <h2 class="netflix-section-title">Search Results (<span id="results-count">0</span>)</h2>
                <div class="netflix-grid" id="search-results"></div>
            </section>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 GitHub CMS</p>
        </div>
    </footer>

    <script src="js/user-auth.js"></script>
    <script src="js/netflix-cards.js"></script>
    <script>
        let allPosts = [];

        async function loadAllPosts() {
            try {
                const response = await fetch('data/posts-registry.json');
                const data = await response.json();
                allPosts = data.posts || [];
                performSearch();
            } catch (error) {
                console.error('Failed to load posts:', error);
            }
        }

        function performSearch() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const category = document.getElementById('category-filter').value;
            const year = document.getElementById('year-filter').value;
            const rating = document.getElementById('rating-filter').value;

            let results = allPosts.filter(post => {
                const matchesQuery = !query || 
                    post.title.toLowerCase().includes(query) ||
                    post.category.toLowerCase().includes(query) ||
                    (post.tags && post.tags.some(tag => tag.toLowerCase().includes(query)));
                
                const matchesCategory = !category || post.category === category;
                const matchesYear = !year || post.year == year;
                const matchesRating = !rating || post.rating >= parseFloat(rating);

                return matchesQuery && matchesCategory && matchesYear && matchesRating;
            });

            document.getElementById('results-count').textContent = results.length;
            NetflixCards.renderCards(results, 'search-results');
        }

        document.getElementById('search-input').addEventListener('input', performSearch);
        document.getElementById('category-filter').addEventListener('change', performSearch);
        document.getElementById('year-filter').addEventListener('change', performSearch);
        document.getElementById('rating-filter').addEventListener('change', performSearch);

        document.addEventListener('DOMContentLoaded', loadAllPosts);
    </script>
</body>
</html>
